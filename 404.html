<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Not found — Kathryn &amp; Matt</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bark-100); color: var(--bark-800); text-align: center; padding: 24px;
  }
  .wrap { max-width: 30rem; }
  .amp { color: var(--ember-500); font-style: italic; padding: 0 0.12em; }
  h1 { font-weight: 300; letter-spacing: -0.025em; font-size: clamp(28px, 6vw, 44px); margin: 0 0 14px; }
  p { font-size: 17px; line-height: 1.65; color: var(--bark-600); margin: 0 0 28px; }
  a.btn {
    display: inline-block; text-decoration: none; padding: 13px 26px; border-radius: var(--r-pill);
    background: var(--sage-500); color: #fff; font-weight: 500; transition: background .16s ease;
  }
  a.btn:hover { background: var(--sage-600); }
</style>
</head>
<body>
<div class="wrap">
  <p style="font-family: var(--font-mono); letter-spacing: .14em; text-transform: uppercase; font-size: 13px; color: var(--ember-500);">Page not found</p>
  <h1>This path leads into the woods</h1>
  <p>That page isn't here. Let's get you back to Kathryn <span class="amp">&amp;</span> Matt.</p>
  <a class="btn" href="index.html">Back home</a>
</div>
</body>
</html>
